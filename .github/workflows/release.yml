name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-capi:
    name: Build C ABI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p aqkanji2koe-capi

      - name: Package C ABI bundle
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $host = ((rustc -vV | Select-String '^host:').ToString() -replace '^host:\s*', '').Trim()
          $bundle = "aqkanji2koe-capi-$tag-$host"
          $stage = Join-Path $PWD $bundle

          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item include/aqkanji2koe.h $stage
          Copy-Item README.md $stage

          $files = switch ($env:RUNNER_OS) {
            "Windows" { @("aqkanji2koe.dll", "aqkanji2koe.dll.lib", "aqkanji2koe.lib", "aqkanji2koe.pdb") }
            "Linux"   { @("libaqkanji2koe.so", "libaqkanji2koe.a") }
            "macOS"   { @("libaqkanji2koe.dylib", "libaqkanji2koe.a") }
            default   { throw "Unsupported runner OS: $env:RUNNER_OS" }
          }

          foreach ($name in $files) {
            $src = Get-ChildItem target/release -Recurse -Filter $name | Select-Object -First 1
            if (-not $src) {
              throw "Missing build artifact: $name"
            }
            Copy-Item $src.FullName $stage
          }

          Compress-Archive -Path $stage -DestinationPath "$bundle.zip"

      - name: Upload packaged bundle
        uses: actions/upload-artifact@v4
        with:
          name: capi-${{ matrix.os }}
          path: aqkanji2koe-capi-*.zip
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-capi

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.zip > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
