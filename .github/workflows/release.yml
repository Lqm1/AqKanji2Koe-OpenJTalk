name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a draft GitHub Release"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Tag to use when create_release is true (example: v0.1.0-test1)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CAPI_CRATE: aqkanji2koe-capi
  ANDROID_CMDLINE_TOOLS_VERSION: "12266719"
  ANDROID_CMDLINE_TOOLS_SHORT_VERSION: "16.0"

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      artifact_tag: ${{ steps.meta.outputs.artifact_tag }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      should_publish: ${{ steps.meta.outputs.should_publish }}

    steps:
      - id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            artifact_tag="${GITHUB_REF_NAME}"
            release_tag="${GITHUB_REF_NAME}"
            should_publish="true"
          else
            input_tag="${{ inputs.release_tag }}"
            if [[ -n "${input_tag}" ]]; then
              artifact_tag="${input_tag}"
              release_tag="${input_tag}"
            else
              artifact_tag="manual-${GITHUB_RUN_NUMBER}"
              release_tag=""
            fi

            if [[ "${{ inputs.create_release }}" == "true" ]]; then
              if [[ -z "${release_tag}" ]]; then
                echo "release_tag input is required when create_release is true" >&2
                exit 1
              fi
              should_publish="true"
            else
              should_publish="false"
            fi
          fi

          echo "artifact_tag=${artifact_tag}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"

  build-desktop:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
          - label: windows-x86
            runner: windows-latest
            target: i686-pc-windows-msvc
            platform: windows
          - label: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            platform: windows
          - label: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
          - label: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux
          - label: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            platform: macos

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install target
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Build C ABI artifacts
        shell: bash
        run: cargo build --release -p ${{ env.CAPI_CRATE }} --target ${{ matrix.target }}

      - name: Package release bundle
        shell: bash
        run: bash ./scripts/package-capi-bundle.sh "${{ needs.prepare.outputs.artifact_tag }}" "${{ matrix.target }}" "${{ matrix.platform }}"

      - name: Upload packaged bundle
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.label }}
          path: dist/*.tar.gz
          if-no-files-found: error

  build-android:
    name: Build android
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android targets
        shell: bash
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Install Android SDK command-line tools
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/.android/sdk}"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          tools_dir="$ANDROID_SDK_ROOT/cmdline-tools/${ANDROID_CMDLINE_TOOLS_SHORT_VERSION}"
          if [[ ! -x "$tools_dir/bin/sdkmanager" ]]; then
            tmp_dir="$(mktemp -d)"
            archive="commandlinetools-linux-${ANDROID_CMDLINE_TOOLS_VERSION}_latest.zip"
            curl -fsSL "https://dl.google.com/android/repository/${archive}" -o "${tmp_dir}/cmdline-tools.zip"
            unzip -q "${tmp_dir}/cmdline-tools.zip" -d "${tmp_dir}"
            mkdir -p "$tools_dir"
            cp -R "${tmp_dir}/cmdline-tools/." "$tools_dir/"
            rm -rf "$tmp_dir"
          fi
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "$tools_dir/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Install Android NDK and cargo-ndk
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses
          set -o pipefail
          sdkmanager "platform-tools" "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> "$GITHUB_ENV"
          cargo install cargo-ndk --locked

      - name: Build Android shared libraries
        shell: bash
        run: |
          rm -rf android-jni
          cargo ndk -t armeabi-v7a -t arm64-v8a -t x86 -t x86_64 -o android-jni build --release -p "${CAPI_CRATE}"

      - name: Package Android bundle
        shell: bash
        run: bash ./scripts/package-android-bundle.sh "${{ needs.prepare.outputs.artifact_tag }}"

      - name: Upload Android bundle
        uses: actions/upload-artifact@v6
        with:
          name: android
          path: dist/*.tar.gz
          if-no-files-found: error

  build-ios:
    name: Build ios-xcframework
    runs-on: macos-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Apple targets
        shell: bash
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Build iOS static libraries
        shell: bash
        run: |
          cargo build --release -p "${CAPI_CRATE}" --target aarch64-apple-ios
          cargo build --release -p "${CAPI_CRATE}" --target aarch64-apple-ios-sim
          cargo build --release -p "${CAPI_CRATE}" --target x86_64-apple-ios

      - name: Create XCFramework bundle
        shell: bash
        run: |
          rm -rf build/ios-sim dist/aqkanji2koe.xcframework
          mkdir -p build/ios-sim
          lipo -create \
            target/aarch64-apple-ios-sim/release/libaqkanji2koe.a \
            target/x86_64-apple-ios/release/libaqkanji2koe.a \
            -output build/ios-sim/libaqkanji2koe.a

          xcodebuild -create-xcframework \
            -library target/aarch64-apple-ios/release/libaqkanji2koe.a \
            -headers include \
            -library build/ios-sim/libaqkanji2koe.a \
            -headers include \
            -output dist/aqkanji2koe.xcframework

      - name: Package iOS bundle
        shell: bash
        run: bash ./scripts/package-ios-bundle.sh "${{ needs.prepare.outputs.artifact_tag }}"

      - name: Upload iOS bundle
        uses: actions/upload-artifact@v6
        with:
          name: ios
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.should_publish == 'true'
    needs:
      - prepare
      - build-desktop
      - build-android
      - build-ios

    steps:
      - name: Download packaged bundles
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_tag }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
